version: '3'

info:
  companyName: "SergeiPro"
  productName: "TimeSpan"
  productIdentifier: "com.timespan.app"
  description: "A task timings management app"
  copyright: "(c) 2026, SergeiPro"
  comments: "Opensource"
  version: "0.0.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
